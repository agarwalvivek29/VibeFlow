name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build archive
        run: |
          xcodebuild -scheme VibeFlow \
            -configuration Release \
            -archivePath build/VibeFlow.xcarchive \
            archive

      - name: Create DMG staging
        run: |
          mkdir -p build/dmg-staging
          cp -R build/VibeFlow.xcarchive/Products/Applications/VibeFlow.app build/dmg-staging/

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "VibeFlow" \
            -srcfolder build/dmg-staging \
            -ov \
            -format UDZO \
            build/VibeFlow.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeFlow-${{ steps.version.outputs.VERSION }}
          path: build/VibeFlow.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: VibeFlow ${{ steps.version.outputs.VERSION }}
          body: |
            ## VibeFlow ${{ steps.version.outputs.VERSION }}

            ### Installation
            1. Download `VibeFlow.dmg`
            2. Open the DMG file
            3. Drag VibeFlow to your Applications folder
          files: build/VibeFlow.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
